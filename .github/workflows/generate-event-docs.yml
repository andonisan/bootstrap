name: Generate Event Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.cs'
      - 'tools/generate-docs.sh'
  pull_request:
    paths:
      - 'src/**/*.cs'
      - 'tools/generate-docs.sh'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build projects
        run: dotnet build --configuration Release --no-restore
        
      - name: Generate event documentation
        run: |
          chmod +x ./tools/generate-docs.sh
          ./tools/generate-docs.sh
          
      - name: Install AsyncAPI CLI
        run: npm install -g @asyncapi/cli
        
      - name: Validate AsyncAPI spec
        run: asyncapi validate docs-output/asyncapi.yaml
        
      - name: Copy generated docs to docs/events
        run: |
          mkdir -p docs/events
          cp docs-output/*.md docs/events/
          cp docs-output/asyncapi.yaml docs/events/
          
      - name: Commit and push if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/events/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update event documentation [skip ci]"
            git push
          fi
          
      - name: Generate AsyncAPI HTML
        run: |
          asyncapi generate fromTemplate docs-output/asyncapi.yaml @asyncapi/html-template -o docs-output/asyncapi-html --force-write
          
      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: event-documentation
          path: |
            docs-output/
            docs/events/
            
  deploy-pages:
    needs: generate-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: event-documentation
          path: ./docs-artifact
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Create Pages content
        run: |
          mkdir -p _site
          cp -r docs-artifact/docs-output/asyncapi-html/* _site/ || echo "AsyncAPI HTML not generated"
          cp -r docs/events/* _site/ || cp -r docs-artifact/docs/events/* _site/
          
          # Create index.html
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Bootstrap Event Documentation</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                      max-width: 1200px;
                      margin: 0 auto;
                      padding: 20px;
                      line-height: 1.6;
                      color: #333;
                  }
                  h1 { color: #0066cc; }
                  h2 { color: #0099ff; border-bottom: 2px solid #0099ff; padding-bottom: 10px; }
                  .card {
                      border: 1px solid #ddd;
                      border-radius: 8px;
                      padding: 20px;
                      margin: 20px 0;
                      background: #f9f9f9;
                  }
                  a {
                      color: #0066cc;
                      text-decoration: none;
                  }
                  a:hover {
                      text-decoration: underline;
                  }
                  ul {
                      list-style-type: none;
                      padding-left: 0;
                  }
                  li {
                      padding: 10px;
                      margin: 5px 0;
                      background: white;
                      border-left: 4px solid #0066cc;
                      border-radius: 4px;
                  }
              </style>
          </head>
          <body>
              <h1>Bootstrap Event Documentation</h1>
              <p>Auto-generated documentation for integration events (CAP) and domain events (MediatR).</p>
              
              <div class="card">
                  <h2>Documentation</h2>
                  <ul>
                      <li><a href="README.html">📖 Overview</a> - Introduction to event documentation</li>
                      <li><a href="integration-events.html">🔄 Integration Events</a> - CAP event bus topics and consumers</li>
                      <li><a href="domain-events.html">⚡ Domain Events</a> - MediatR events and handlers with flow diagrams</li>
                      <li><a href="asyncapi.yaml">📋 AsyncAPI Spec (YAML)</a> - Raw AsyncAPI specification</li>
                      <li><a href="index.html">🌐 AsyncAPI HTML</a> - Interactive AsyncAPI documentation</li>
                  </ul>
              </div>
              
              <div class="card">
                  <h2>Quick Links</h2>
                  <ul>
                      <li><a href="https://github.com/andonisan/bootstrap" target="_blank">📦 Repository</a></li>
                      <li><a href="https://www.asyncapi.com/" target="_blank">🔗 AsyncAPI</a></li>
                      <li><a href="https://github.com/dotnetcore/CAP" target="_blank">🚀 CAP Framework</a></li>
                      <li><a href="https://github.com/jbogard/MediatR" target="_blank">💬 MediatR</a></li>
                  </ul>
              </div>
          </body>
          </html>
          EOF
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
